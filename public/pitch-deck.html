<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SHAHID.AI — Hackathon Pitch Deck</title>
<style>
/* ── Reset + Base ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#050d1a;font-family:'Segoe UI',system-ui,sans-serif;color:#f0f4ff;overflow:hidden}

/* ── Deck container ── */
#deck{width:100vw;height:100vh;position:relative}
.slide{position:absolute;inset:0;display:none;flex-direction:column;padding:48px 60px 36px;background:#050d1a;overflow:hidden}
.slide.active{display:flex}

/* ── Background grid ── */
.slide::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,180,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}

/* ── Glow accents ── */
.glow-tl{position:absolute;top:-120px;left:-120px;width:480px;height:480px;background:radial-gradient(circle,rgba(0,120,255,0.18) 0%,transparent 70%);pointer-events:none}
.glow-br{position:absolute;bottom:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(0,200,180,0.12) 0%,transparent 70%);pointer-events:none}

/* ── Nav ── */
#nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:16px;z-index:100;background:rgba(10,20,40,0.85);border:1px solid rgba(0,180,255,0.2);border-radius:40px;padding:10px 24px;backdrop-filter:blur(8px)}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(0,180,255,0.25);border:1px solid rgba(0,180,255,0.4);cursor:pointer;transition:all .2s}
.dot.active{background:#00b4ff;box-shadow:0 0 10px #00b4ff}
#nav button{background:none;border:1px solid rgba(0,180,255,0.3);color:#7ec8e3;border-radius:20px;padding:5px 16px;font-size:12px;cursor:pointer;transition:all .2s}
#nav button:hover{border-color:#00b4ff;color:#00b4ff}
#slide-counter{font-size:11px;color:#4a7a9b;min-width:36px;text-align:center}

/* ── Typography ── */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#00b4ff;margin-bottom:8px}
h1{font-size:42px;font-weight:900;line-height:1.1;color:#fff}
h1 span{color:#00b4ff}
h2{font-size:28px;font-weight:800;color:#fff;margin-bottom:4px}
h3{font-size:15px;font-weight:700;color:#00b4ff;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.sub{font-size:14px;color:#7ec8e3;line-height:1.6}

/* ── Utility ── */
.row{display:flex;gap:24px;align-items:stretch}
.col{display:flex;flex-direction:column}
.flex1{flex:1}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.mt24{margin-top:24px}

/* ── Cards ── */
.card{background:rgba(0,30,60,0.6);border:1px solid rgba(0,180,255,0.15);border-radius:12px;padding:18px 20px}
.card-red{border-color:rgba(255,60,60,0.25);background:rgba(60,0,0,0.35)}
.card-cyan{border-color:rgba(0,180,255,0.3);background:rgba(0,40,80,0.5)}
.card-green{border-color:rgba(0,220,130,0.25);background:rgba(0,50,30,0.4)}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,180,255,0.12);border:1px solid rgba(0,180,255,0.3);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#00b4ff}
.badge-green{background:rgba(0,220,130,0.1);border-color:rgba(0,220,130,0.3);color:#00dc82}
.badge-amber{background:rgba(255,180,0,0.1);border-color:rgba(255,180,0,0.3);color:#ffb400}
.badge-red{background:rgba(255,60,60,0.1);border-color:rgba(255,60,60,0.3);color:#ff4444}

/* ── Divider ── */
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,0.3),transparent);margin:16px 0}

/* ── SLIDE 1 specific ── */
.problem-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.problem-list li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#b0c8e0;line-height:1.4}
.problem-list li::before{content:'✗';color:#ff4444;font-weight:900;font-size:14px;flex-shrink:0;margin-top:1px}

.flow-step{display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(0,40,80,0.5);border:1px solid rgba(0,180,255,0.2);border-radius:8px;font-size:12px;font-weight:600;color:#c8e0f0}
.flow-step .icon{font-size:16px;flex-shrink:0}
.flow-arrow{text-align:center;color:#00b4ff;font-size:14px;line-height:1;margin:2px 0}

.callout-box{background:linear-gradient(135deg,rgba(0,80,160,0.5),rgba(0,40,100,0.7));border:1px solid rgba(0,180,255,0.4);border-radius:10px;padding:14px 18px;text-align:center}
.callout-box .big{font-size:16px;font-weight:900;color:#fff;line-height:1.3}
.callout-box .accent{color:#00b4ff}

.badge-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
</style>

<style>
/* ── SLIDE 2 specific ── */
.arch-layer{display:flex;align-items:stretch;gap:0;margin-bottom:6px;position:relative}
.layer-label{width:160px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;padding:10px 14px;border-radius:8px 0 0 8px;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.layer-body{flex:1;display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:10px 14px;border-radius:0 8px 8px 0;border-left:none}
.layer-chip{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:4px 10px;font-size:11px;color:#d0e8ff;font-weight:600}
.layer-arrow{text-align:center;color:rgba(0,180,255,0.5);font-size:12px;margin:1px 0 1px 80px}

.l1{background:rgba(0,60,120,0.5);border:1px solid rgba(0,180,255,0.25);color:#7ec8e3}
.l1b{background:rgba(0,40,90,0.4);border:1px solid rgba(0,180,255,0.15)}
.l2{background:rgba(0,100,80,0.4);border:1px solid rgba(0,220,130,0.25);color:#00dc82}
.l2b{background:rgba(0,60,50,0.4);border:1px solid rgba(0,220,130,0.12)}
.l3{background:rgba(80,0,160,0.4);border:1px solid rgba(160,80,255,0.3);color:#c084fc}
.l3b{background:rgba(50,0,100,0.4);border:1px solid rgba(160,80,255,0.15)}
.l4{background:rgba(160,40,0,0.4);border:1px solid rgba(255,120,0,0.3);color:#fb923c}
.l4b{background:rgba(100,30,0,0.4);border:1px solid rgba(255,120,0,0.15)}
.l5{background:rgba(0,100,60,0.5);border:1px solid rgba(0,220,130,0.35);color:#00dc82}
.l5b{background:rgba(0,60,40,0.4);border:1px solid rgba(0,220,130,0.15)}

.ai-stack-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(0,30,60,0.6);border:1px solid rgba(0,180,255,0.15);border-radius:6px;font-size:11px;color:#b0d0f0;font-weight:600}
.ai-stack-item .dot-ai{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.tech-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:4px 10px;font-size:10px;color:#7ec8e3;font-weight:700}

/* ── SLIDE 3 specific ── */
.innov-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:rgba(0,30,60,0.5);border:1px solid rgba(0,180,255,0.15);border-radius:8px;font-size:12px;color:#c0d8f0;line-height:1.4}
.innov-item .ico{font-size:18px;flex-shrink:0}

.impact-row{display:flex;gap:10px}
.impact-card{flex:1;text-align:center;padding:12px 8px;border-radius:8px;border:1px solid}
.impact-card .who{font-size:18px;margin-bottom:4px}
.impact-card .who-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.impact-card .what{font-size:10px;line-height:1.5;opacity:0.8}

.demo-step{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;font-size:12px;font-weight:600}
.demo-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}

.wow-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:0.5px}

.closing-bar{background:linear-gradient(90deg,rgba(0,80,160,0.6),rgba(0,160,120,0.4));border:1px solid rgba(0,180,255,0.3);border-radius:10px;padding:16px 24px;text-align:center;margin-top:auto}
.closing-bar .closing-text{font-size:17px;font-weight:900;color:#fff;line-height:1.3}
.closing-bar .closing-accent{color:#00b4ff}

/* ── SLIDE 4 specific ── */
.walkthrough-step{display:flex;gap:16px;align-items:flex-start;padding:12px 16px;border-radius:10px;border:1px solid rgba(0,180,255,0.15);background:rgba(0,25,55,0.5)}
.ws-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;border:2px solid}
.ws-body .ws-title{font-size:13px;font-weight:800;color:#fff;margin-bottom:3px}
.ws-body .ws-desc{font-size:11px;color:#7ec8e3;line-height:1.4}
.ws-body .ws-signal{font-size:10px;color:#00dc82;margin-top:4px;font-family:monospace}
</style>
